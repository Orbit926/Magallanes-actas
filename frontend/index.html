<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    
    <!-- PWA Meta Tags -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#CC5629" />
    <meta name="description" content="Sistema de actas de entrega-recepción de viviendas" />
    
    <!-- iOS/iPad PWA Meta Tags -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Entrega Digital" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="format-detection" content="telephone=no" />
    
    <!-- Prevent iOS zoom on input focus -->
    <meta name="HandheldFriendly" content="true" />
    
    <!-- Manifest -->
    <link rel="manifest" href="/manifest.json" />
    
    <!-- Icons -->
    <link rel="icon" type="image/png" sizes="32x32" href="/icons/icon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/icons/icon-16x16.png" />
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
    <link rel="apple-touch-icon" sizes="152x152" href="/icons/icon-152x152.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/icons/apple-touch-icon.png" />
    <link rel="apple-touch-icon" sizes="167x167" href="/icons/icon-167x167.png" />
    
    <!-- iOS Splash Screens -->
    <!-- iPad Pro 12.9" -->
    <link rel="apple-touch-startup-image" 
          media="(device-width: 1024px) and (device-height: 1366px) and (-webkit-device-pixel-ratio: 2)" 
          href="/splash/splash-2048x2732.png" />
    <!-- iPad Pro 11" -->
    <link rel="apple-touch-startup-image" 
          media="(device-width: 834px) and (device-height: 1194px) and (-webkit-device-pixel-ratio: 2)" 
          href="/splash/splash-1668x2388.png" />
    <!-- iPad Pro 10.5" -->
    <link rel="apple-touch-startup-image" 
          media="(device-width: 834px) and (device-height: 1112px) and (-webkit-device-pixel-ratio: 2)" 
          href="/splash/splash-1668x2224.png" />
    <!-- iPad Mini, Air -->
    <link rel="apple-touch-startup-image" 
          media="(device-width: 768px) and (device-height: 1024px) and (-webkit-device-pixel-ratio: 2)" 
          href="/splash/splash-1536x2048.png" />
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
    
    <title>Entrega Digital</title>
    
    <style>
      /* Reset and base styles */
      * { 
        margin: 0; 
        padding: 0; 
        box-sizing: border-box; 
        -webkit-tap-highlight-color: transparent;
      }
      
      html {
        height: 100%;
        overflow: hidden;
      }
      
      body { 
        -webkit-font-smoothing: antialiased; 
        -moz-osx-font-smoothing: grayscale;
        height: 100%;
        overflow: hidden;
        overscroll-behavior: none;
        -webkit-overflow-scrolling: touch;
        /* Safe area padding for notched devices */
        padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
      }
      
      #root {
        height: 100%;
        overflow: auto;
        -webkit-overflow-scrolling: touch;
      }
      
      /* Prevent pull-to-refresh */
      body {
        overscroll-behavior-y: contain;
      }
      
      /* Disable text selection for app-like feel */
      .no-select {
        -webkit-user-select: none;
        user-select: none;
      }
      
      /* Touch-friendly buttons */
      button, .touchable {
        touch-action: manipulation;
      }
      
      /* Prevent iOS zoom on input focus */
      input, select, textarea {
        font-size: 16px !important;
      }
      
      /* Loading screen */
      .pwa-loading {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: #F5F7FA;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 9999;
      }
      
      .pwa-loading-logo {
        width: 80px;
        height: 80px;
        margin-bottom: 20px;
      }
      
      .pwa-loading-spinner {
        width: 40px;
        height: 40px;
        border: 3px solid #E0E0E0;
        border-top-color: #CC5629;
        border-radius: 50%;
        animation: spin 1s linear infinite;
      }
      
      @keyframes spin {
        to { transform: rotate(360deg); }
      }
    </style>
  </head>
  <body>
    <!-- Loading screen while app loads -->
    <div class="pwa-loading" id="pwa-loading">
      <img src="/logos/logo.png" alt="Logo" class="pwa-loading-logo" />
      <div class="pwa-loading-spinner"></div>
    </div>
    
    <div id="root"></div>
    
    <script type="module" src="/src/main.jsx"></script>
    
    <!-- Register Service Worker -->
    <script>
      // Hide loading screen when app is ready
      window.addEventListener('load', () => {
        const loader = document.getElementById('pwa-loading');
        if (loader) {
          setTimeout(() => {
            loader.style.opacity = '0';
            loader.style.transition = 'opacity 0.3s ease';
            setTimeout(() => loader.remove(), 300);
          }, 500);
        }
      });
      
      // Register Service Worker
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then((registration) => {
              console.log('[PWA] Service Worker registered:', registration.scope);
            })
            .catch((error) => {
              console.log('[PWA] Service Worker registration failed:', error);
            });
        });
      }
    </script>
  </body>
</html>
